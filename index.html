<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Lexify Vocabulary Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#f4f7fb;
  color:#111827;
}

.app{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:250px;
  background:white;
  border-right:1px solid #e5e7eb;
  padding:30px 20px;
  position:fixed;
  height:100vh;
  overflow:auto;
}

.logo{
  font-size:38px;
  font-weight:800;
  color:#2563eb;
  margin-bottom:40px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav button{
  border:none;
  background:none;
  padding:14px 18px;
  border-radius:16px;
  text-align:left;
  font-weight:700;
  color:#6b7280;
  cursor:pointer;
  transition:0.2s;
  font-size:15px;
}

.nav button:hover{
  background:#eef4ff;
  color:#2563eb;
}

.nav button.active{
  background:#2563eb;
  color:white;
}

/* MAIN */

.main{
  margin-left:250px;
  width:calc(100% - 250px);
}

/* TOPBAR */

.topbar{
  height:90px;
  background:white;
  border-bottom:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 34px;
}

.search{
  width:360px;
  height:48px;
  border:none;
  border-radius:16px;
  background:#f4f7fb;
  padding:0 18px;
  outline:none;
  font-size:15px;
}

.top-actions{
  display:flex;
  align-items:center;
  gap:16px;
}

.create-btn{
  border:none;
  background:#2563eb;
  color:white;
  padding:14px 20px;
  border-radius:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.create-btn:hover{
  transform:translateY(-2px);
}

.avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#dbeafe;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#2563eb;
  font-weight:800;
}

/* CONTENT */

.content{
  padding:36px;
}

/* HERO */

.hero{
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  border-radius:34px;
  padding:42px;
  color:white;
  margin-bottom:38px;
}

.hero h1{
  font-size:52px;
  margin-bottom:12px;
}

.hero p{
  font-size:18px;
  opacity:0.95;
  line-height:1.7;
}

/* SECTION */

.section{
  margin-top:46px;
}

.section-title{
  font-size:34px;
  font-weight:800;
  margin-bottom:24px;
}

/* CATEGORY GRID */

.categories-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:22px;
}

.category-card{
  background:white;
  border-radius:28px;
  padding:28px;
  cursor:pointer;
  transition:0.25s;
  position:relative;
  overflow:hidden;
}

.category-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(37,99,235,0.08),transparent);
}

.category-card:hover{
  transform:translateY(-5px);
  box-shadow:0 18px 40px rgba(37,99,235,0.08);
}

.category-icon{
  font-size:38px;
  margin-bottom:18px;
  position:relative;
}

.category-title{
  font-size:24px;
  font-weight:800;
  margin-bottom:8px;
  position:relative;
}

.category-count{
  color:#6b7280;
  position:relative;
}

/* WORDS */

.words-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:22px;
}

.word-card{
  background:white;
  border-radius:28px;
  padding:24px;
  cursor:pointer;
  transition:0.25s;
  position:relative;
  overflow:hidden;
  border:1px solid #eef2f7;
}

.word-card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:5px;
  background:linear-gradient(90deg,#2563eb,#60a5fa);
}

.word-card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(0,0,0,0.06);
}

.word-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.word-tag{
  background:#eef4ff;
  color:#2563eb;
  padding:7px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.favorite-icon{
  width:38px;
  height:38px;
  border-radius:12px;
  background:#fff7ed;
  color:#f59e0b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.word-title{
  font-size:32px;
  font-weight:800;
  margin-bottom:8px;
}

.word-type{
  color:#6b7280;
  margin-bottom:18px;
  font-size:14px;
}

.word-short{
  color:#4b5563;
  line-height:1.7;
  font-size:15px;
  margin-bottom:24px;
  min-height:52px;
}

.word-actions{
  display:flex;
  gap:12px;
}

.action-btn{
  flex:1;
  border:none;
  padding:14px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.action-btn:hover{
  transform:translateY(-2px);
}

.favorite-btn{
  background:#fff7ed;
  color:#ea580c;
}

.favorite-btn.active{
  background:#f59e0b;
  color:white;
}

.list-btn{
  background:#eef4ff;
  color:#2563eb;
}

/* LISTS */

.lists-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:22px;
}

.list-card{
  background:white;
  border-radius:28px;
  padding:28px;
  cursor:pointer;
  transition:0.25s;
}

.list-card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(0,0,0,0.05);
}

.list-title{
  font-size:26px;
  font-weight:800;
  margin-bottom:10px;
}

.list-meta{
  color:#6b7280;
  margin-bottom:18px;
}

.progress{
  width:100%;
  height:10px;
  border-radius:999px;
  background:#edf2f7;
  overflow:hidden;
  margin-bottom:18px;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#2563eb,#60a5fa);
}

.list-preview{
  color:#6b7280;
  line-height:1.7;
  font-size:14px;
}

/* PAGE */

.hidden{
  display:none;
}

.back-btn{
  border:none;
  background:white;
  padding:14px 18px;
  border-radius:16px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:24px;
}

/* WORD MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.modal.active{
  display:flex;
}

.modal-card{
  width:100%;
  max-width:760px;
  background:white;
  border-radius:34px;
  padding:38px;
  max-height:90vh;
  overflow:auto;
  position:relative;
}

.close-modal{
  position:absolute;
  top:18px;
  right:24px;
  border:none;
  background:none;
  font-size:34px;
  cursor:pointer;
}

.modal-word{
  font-size:54px;
  font-weight:800;
  margin-bottom:10px;
}

.modal-type{
  color:#6b7280;
  margin-bottom:28px;
}

.modal-definition{
  font-size:20px;
  line-height:1.8;
}

.modal-section{
  margin-top:34px;
}

.modal-section h4{
  margin-bottom:14px;
  font-size:18px;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.tags span{
  background:#f4f7fb;
  padding:10px 14px;
  border-radius:999px;
  font-weight:600;
}

.examples{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.example{
  background:#f8fafc;
  padding:18px;
  border-radius:18px;
  line-height:1.7;
}

.mnemonic{
  background:#eef4ff;
  padding:20px;
  border-radius:20px;
  line-height:1.8;
}

/* LIST SELECT MODAL */

.list-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1200;
  padding:20px;
}

.list-modal.active{
  display:flex;
}

.list-modal-card{
  width:100%;
  max-width:500px;
  background:white;
  border-radius:30px;
  padding:30px;
}

.list-modal-title{
  font-size:28px;
  font-weight:800;
  margin-bottom:24px;
}

.checkbox-group{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:24px;
}

.checkbox-item{
  background:#f4f7fb;
  padding:16px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
}

.modal-btn{
  border:none;
  padding:14px 18px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.cancel-btn{
  background:#eef2f7;
}

.save-btn{
  background:#2563eb;
  color:white;
}

/* MOBILE */

@media(max-width:900px){

  .sidebar{
    display:none;
  }

  .main{
    margin-left:0;
    width:100%;
  }

  .hero h1{
    font-size:38px;
  }

  .content{
    padding:22px;
  }

  .topbar{
    padding:0 20px;
  }

  .search{
    width:180px;
  }

}

</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      Lexify
    </div>

    <div class="nav">

      <button class="active">
        Vocabulary Library
      </button>

      <button onclick="goHome()">
        Categories
      </button>

      <button onclick="goHome()">
        My Lists
      </button>

      <button onclick="openFavorites()">
        Favorites
      </button>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <!-- TOPBAR -->

    <div class="topbar">

      <input
        type="text"
        class="search"
        placeholder="Search vocabulary..."
      >

      <div class="top-actions">

        <button
          class="create-btn"
          onclick="createList()"
        >
          + Create List
        </button>

        <div class="avatar">
          A
        </div>

      </div>

    </div>

    <!-- CONTENT -->

    <div class="content">

      <!-- HOME -->

      <div id="homePage">

        <div class="hero">

          <h1>
            Vocabulary Library
          </h1>

          <p>
            Build your TOEFL vocabulary with smart flashcards,
            custom lists, and favorites.
          </p>

        </div>

        <!-- CATEGORIES -->

        <section class="section">

          <h2 class="section-title">
            Categories
          </h2>

          <div
            class="categories-grid"
            id="categoriesGrid">
          </div>

        </section>

        <!-- FEATURED WORDS -->

        <section class="section">

          <h2 class="section-title">
            Featured Words
          </h2>

          <div
            class="words-grid"
            id="featuredWords">
          </div>

        </section>

        <!-- LISTS -->

        <section class="section">

          <h2 class="section-title">
            My Lists
          </h2>

          <div
            class="lists-grid"
            id="listsGrid">
          </div>

        </section>

      </div>

      <!-- CATEGORY PAGE -->

      <div
        id="categoryPage"
        class="hidden">

        <button
          class="back-btn"
          onclick="goHome()">

          ← Back

        </button>

        <h2
          class="section-title"
          id="categoryTitle">
        </h2>

        <div
          class="words-grid"
          id="categoryWords">
        </div>

      </div>

    </div>

  </main>

</div>

<!-- WORD MODAL -->

<div
  class="modal"
  id="wordModal">

  <div class="modal-card">

    <button
      class="close-modal"
      onclick="closeModal()">

      ×

    </button>

    <div
      class="modal-word"
      id="modalWord">
    </div>

    <div
      class="modal-type"
      id="modalType">
    </div>

    <div
      class="modal-definition"
      id="modalDefinition">
    </div>

    <div class="modal-section">

      <h4>Synonyms</h4>

      <div
        class="tags"
        id="modalSynonyms">
      </div>

    </div>

    <div class="modal-section">

      <h4>Antonyms</h4>

      <div
        class="tags"
        id="modalAntonyms">
      </div>

    </div>

    <div class="modal-section">

      <h4>Examples</h4>

      <div
        class="examples"
        id="modalExamples">
      </div>

    </div>

    <div class="modal-section">

      <h4>Mnemonic</h4>

      <div
        class="mnemonic"
        id="modalMnemonic">
      </div>

    </div>

  </div>

</div>

<!-- LIST MODAL -->

<div
  class="list-modal"
  id="listModal">

  <div class="list-modal-card">

    <div class="list-modal-title">
      Add word to lists
    </div>

    <div
      class="checkbox-group"
      id="checkboxGroup">
    </div>

    <div class="modal-actions">

      <button
        class="modal-btn cancel-btn"
        onclick="closeListModal()">

        Cancel

      </button>

      <button
        class="modal-btn save-btn"
        onclick="saveWordToLists()">

        Add

      </button>

    </div>

  </div>

</div>

<script>

/* WORDS */

const words = [

{
  word:"ABANDON",
  type:"verb",
  category:"Psychology",
  short:"to leave completely",
  definition:"To leave behind permanently or stop supporting something.",
  synonyms:["desert","leave","forsake","quit"],
  antonyms:["keep","support","continue"],
  examples:[
    "He abandoned the project.",
    "She never abandoned her dreams."
  ],
  mnemonic:"Imagine abandoning a building forever."
},

{
  word:"REVENUE",
  type:"noun",
  category:"Business",
  short:"income earned",
  definition:"Money generated from business operations.",
  synonyms:["income","earnings","profit"],
  antonyms:["loss","expense"],
  examples:[
    "The company increased revenue."
  ],
  mnemonic:"Revenue returns money to business."
},

{
  word:"AESTHETIC",
  type:"adjective",
  category:"Art",
  short:"related to beauty",
  definition:"Concerned with beauty or artistic taste.",
  synonyms:["artistic","beautiful","elegant"],
  antonyms:["ugly","plain"],
  examples:[
    "The room has a modern aesthetic."
  ],
  mnemonic:"Aesthetic = artistic style."
},

{
  word:"EMPIRE",
  type:"noun",
  category:"History",
  short:"large ruling state",
  definition:"A group of territories ruled by one authority.",
  synonyms:["kingdom","realm","dynasty"],
  antonyms:["republic"],
  examples:[
    "The Roman Empire expanded widely."
  ],
  mnemonic:"Empire = emperor ruling lands."
}

];

/* CATEGORIES */

const categories = [

{
  name:"Psychology",
  icon:"🧠"
},

{
  name:"Business",
  icon:"💼"
},

{
  name:"Art",
  icon:"🎨"
},

{
  name:"History",
  icon:"🏛️"
}

];

/* LISTS */

let lists = [

{
  name:"TOEFL Week 1",
  words:[]
},

{
  name:"Difficult Words",
  words:[]
}

];

/* FAVORITES */

let favorites = [];

/* SELECTED WORD */

let selectedWord = null;

/* RENDER CATEGORIES */

function renderCategories(){

  const grid =
    document.getElementById("categoriesGrid");

  grid.innerHTML = "";

  categories.forEach(cat=>{

    const count =
      words.filter(
        w=>w.category===cat.name
      ).length;

    grid.innerHTML += `

      <div
        class="category-card"
        onclick="openCategory('${cat.name}')">

        <div class="category-icon">
          ${cat.icon}
        </div>

        <div class="category-title">
          ${cat.name}
        </div>

        <div class="category-count">
          ${count} words
        </div>

      </div>

    `;

  });

}

/* CREATE WORD CARD */

function createWordCard(word){

  const isFavorite =
    favorites.includes(word.word);

  return `

    <div
      class="word-card"
      onclick="openWord('${word.word}')">

      <div class="word-top">

        <div class="word-tag">
          ${word.category}
        </div>

        <div class="favorite-icon">
          ✦
        </div>

      </div>

      <div class="word-title">
        ${word.word}
      </div>

      <div class="word-type">
        ${word.type}
      </div>

      <div class="word-short">
        ${word.short}
      </div>

      <div class="word-actions">

        <button
          class="action-btn favorite-btn ${isFavorite ? 'active' : ''}"
          onclick="toggleFavorite(event,'${word.word}')">

          ★ Favorite

        </button>

        <button
          class="action-btn list-btn"
          onclick="openListSelector(event,'${word.word}')">

          + Add to List

        </button>

      </div>

    </div>

  `;

}

/* FEATURED WORDS */

function renderFeaturedWords(){

  const container =
    document.getElementById("featuredWords");

  container.innerHTML = "";

  words.forEach(word=>{

    container.innerHTML +=
      createWordCard(word);

  });

}

/* RENDER LISTS */

function renderLists(){

  const grid =
    document.getElementById("listsGrid");

  grid.innerHTML = "";

  lists.forEach((list,index)=>{

    grid.innerHTML += `

      <div
        class="list-card"
        onclick="openList(${index})">

        <div class="list-title">
          ${list.name}
        </div>

        <div class="list-meta">
          ${list.words.length} words
        </div>

        <div class="progress">

          <div
            class="progress-fill"
            style="
              width:${Math.min(list.words.length*20,100)}%
            ">
          </div>

        </div>

        <div class="list-preview">

          ${
            list.words.length
            ? list.words.join(", ")
            : "No words yet"
          }

        </div>

      </div>

    `;

  });

}

/* OPEN CATEGORY */

function openCategory(name){

  document.getElementById("homePage")
    .classList.add("hidden");

  document.getElementById("categoryPage")
    .classList.remove("hidden");

  document.getElementById("categoryTitle")
    .innerText = name;

  const container =
    document.getElementById("categoryWords");

  container.innerHTML = "";

  words
    .filter(w=>w.category===name)
    .forEach(word=>{

      container.innerHTML +=
        createWordCard(word);

    });

}

/* OPEN FAVORITES */

function openFavorites(){

  document.getElementById("homePage")
    .classList.add("hidden");

  document.getElementById("categoryPage")
    .classList.remove("hidden");

  document.getElementById("categoryTitle")
    .innerText = "Favorites";

  const container =
    document.getElementById("categoryWords");

  container.innerHTML = "";

  const favoriteWords =
    words.filter(
      w=>favorites.includes(w.word)
    );

  if(favoriteWords.length===0){

    container.innerHTML = `
      <div class="list-card">
        No favorite words yet.
      </div>
    `;

    return;
  }

  favoriteWords.forEach(word=>{

    container.innerHTML +=
      createWordCard(word);

  });

}

/* GO HOME */

function goHome(){

  document.getElementById("homePage")
    .classList.remove("hidden");

  document.getElementById("categoryPage")
    .classList.add("hidden");

}

/* OPEN LIST */

function openList(index){

  const list = lists[index];

  document.getElementById("homePage")
    .classList.add("hidden");

  document.getElementById("categoryPage")
    .classList.remove("hidden");

  document.getElementById("categoryTitle")
    .innerText = list.name;

  const container =
    document.getElementById("categoryWords");

  container.innerHTML = "";

  if(list.words.length===0){

    container.innerHTML = `
      <div class="list-card">
        This list is empty.
      </div>
    `;

    return;
  }

  list.words.forEach(wordName=>{

    const word =
      words.find(
        w=>w.word===wordName
      );

    if(word){

      container.innerHTML +=
        createWordCard(word);

    }

  });

}

/* WORD MODAL */

function openWord(name){

  const word =
    words.find(w=>w.word===name);

  document.getElementById("wordModal")
    .classList.add("active");

  document.getElementById("modalWord")
    .innerText = word.word;

  document.getElementById("modalType")
    .innerText = word.type;

  document.getElementById("modalDefinition")
    .innerText = word.definition;

  document.getElementById("modalSynonyms")
    .innerHTML =
      word.synonyms
        .map(s=>`<span>${s}</span>`)
        .join("");

  document.getElementById("modalAntonyms")
    .innerHTML =
      word.antonyms
        .map(a=>`<span>${a}</span>`)
        .join("");

  document.getElementById("modalExamples")
    .innerHTML =
      word.examples
        .map(e=>`
          <div class="example">
            ${e}
          </div>
        `)
        .join("");

  document.getElementById("modalMnemonic")
    .innerText =
      word.mnemonic;

}

/* CLOSE MODAL */

function closeModal(){

  document.getElementById("wordModal")
    .classList.remove("active");

}

/* CREATE LIST */

function createList(){

  const name =
    prompt("Enter list name");

  if(!name) return;

  lists.push({

    name:name,
    words:[]

  });

  renderLists();

}

/* OPEN LIST SELECTOR */

function openListSelector(event,wordName){

  event.stopPropagation();

  selectedWord = wordName;

  const group =
    document.getElementById("checkboxGroup");

  group.innerHTML = "";

  lists.forEach((list,index)=>{

    group.innerHTML += `

      <label class="checkbox-item">

        <input
          type="checkbox"
          value="${index}">

        <span>
          ${list.name}
        </span>

      </label>

    `;

  });

  document.getElementById("listModal")
    .classList.add("active");

}

/* CLOSE LIST MODAL */

function closeListModal(){

  document.getElementById("listModal")
    .classList.remove("active");

}

/* SAVE WORD TO LISTS */

function saveWordToLists(){

  const checked =
    document.querySelectorAll(
      "#checkboxGroup input:checked"
    );

  checked.forEach(box=>{

    const list =
      lists[box.value];

    if(
      !list.words.includes(selectedWord)
    ){

      list.words.push(selectedWord);

    }

  });

  renderLists();

  closeListModal();

}

/* FAVORITES */

function toggleFavorite(event,wordName){

  event.stopPropagation();

  if(favorites.includes(wordName)){

    favorites =
      favorites.filter(
        word=>word!==wordName
      );

  }else{

    favorites.push(wordName);

  }

  renderFeaturedWords();

}

/* INIT */

renderCategories();
renderFeaturedWords();
renderLists();

</script>
